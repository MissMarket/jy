<!DOCTYPE html>
<html lang="zh-CN">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>股票数据请求示例2222</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                text-align: center;
                margin-top: 50px;
            }

            #result {
                margin-top: 20px;
                padding: 15px;
                border-radius: 5px;
                font-weight: bold;
            }

            .success {
                background-color: #d4edda;
                color: #155724;
                border: 1px solid #c3e6cb;
            }

            .error {
                background-color: #f8d7da;
                color: #721c24;
                border: 1px solid #f5c6cb;
            }

            button {
                padding: 10px 20px;
                background-color: #007bff;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
            }

            button:hover {
                background-color: #0056b3;
            }
        </style>
    </head>

    <body>
        <h1>股票数据请求测试</h1>
        <button onclick="fetchData()">请求数据</button>
        <div id="result"></div>
        <div id="data" style="margin-top: 20px; text-align: left; max-width: 800px; margin: 20px auto;"></div>

        <script>
            function fetchData () {
                const resultDiv = document.getElementById('result');
                const dataDiv = document.getElementById('data');

                // 清空之前的结果
                resultDiv.textContent = '请求中...';
                resultDiv.className = '';
                dataDiv.textContent = '';

                // 接口URL
                const apiUrl = 'https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?param=sh000922,day,2024-03-29,2025-08-11,600,qfq';

                // 发起fetch请求
                fetch(apiUrl)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('网络响应不正常');
                        }
                        return response.json();
                    })
                    .then(data => {
                        // 请求成功
                        resultDiv.textContent = '✅ 请求成功！';
                        resultDiv.className = 'success';

                        // 显示返回的数据（格式化后的JSON）
                        dataDiv.textContent = JSON.stringify(data, null, 2);
                        console.log('返回数据:', data);
                    })
                    .catch(error => {
                        // 请求失败
                        resultDiv.textContent = '❌ 请求失败: ' + error.message;
                        resultDiv.className = 'error';
                        console.error('请求错误:', error);
                    });
            }
        </script>
    </body>

</html>
